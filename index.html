<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --peach:        #FF8C6B;
      --peach-light:  #FFB49A;
      --peach-pale:   #FFF0EB;
      --peach-dark:   #C45C3A;
      --ink:          #1A1208;
      --ink-mid:      #5C4033;
      --ink-soft:     #9E7B6E;
      --paper:        #FFFCF9;
      --paper-warm:   #FFF6EF;
      --border:       #EDD9CE;
      --success:      #5A8A5E;
      --error:        #C0392B;
      --mono:         'DM Mono', monospace;
      --serif:        'Instrument Serif', serif;
    }

    html, body {
      height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--mono);
      font-size: 14px;
    }

    /* ── Layout ── */
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      border-bottom: 1.5px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--paper);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-family: var(--serif);
      font-size: 28px;
      color: var(--peach-dark);
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
    }

    .header-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--ink-soft);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.3s;
    }
    .status-dot.connected { background: var(--success); }
    .status-dot.running { background: var(--peach); animation: pulse 1.2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    main {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 0;
    }

    /* ── Sidebar ── */
    .sidebar {
      border-right: 1.5px solid var(--border);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      background: var(--paper-warm);
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 12px;
      font-weight: 500;
    }

    /* Devices */
    .device-list { display: flex; flex-direction: column; gap: 8px; }

    .device-card {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      background: var(--paper);
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .device-card:hover { border-color: var(--peach-light); }
    .device-card.selected {
      border-color: var(--peach);
      box-shadow: 0 0 0 3px rgba(255,140,107,0.15);
    }

    .device-name {
      font-family: var(--serif);
      font-size: 16px;
      color: var(--ink);
      margin-bottom: 4px;
    }

    .device-meta {
      font-size: 11px;
      color: var(--ink-soft);
    }

    .no-device {
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      color: var(--ink-soft);
      font-size: 12px;
      line-height: 1.6;
    }

    /* Backup dir */
    .dir-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"] {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-family: var(--mono);
      font-size: 12px;
      background: var(--paper);
      color: var(--ink);
      transition: border-color 0.2s;
      min-width: 0;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: var(--peach);
    }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-family: var(--mono);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-ghost {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--ink-mid);
    }
    .btn-ghost:hover { border-color: var(--peach-light); color: var(--ink); }

    .btn-primary {
      background: var(--peach);
      color: white;
      font-weight: 500;
      padding: 12px 24px;
      font-size: 13px;
      border-radius: 10px;
      width: 100%;
    }
    .btn-primary:hover { background: var(--peach-dark); }
    .btn-primary:disabled {
      background: var(--border);
      color: var(--ink-soft);
      cursor: not-allowed;
    }

    .btn-cancel {
      background: transparent;
      border: 1.5px solid var(--error);
      color: var(--error);
      width: 100%;
      padding: 10px;
      border-radius: 10px;
    }
    .btn-cancel:hover { background: var(--error); color: white; }

    /* ── Content ── */
    .content {
      display: flex;
      flex-direction: column;
      padding: 28px 32px;
      gap: 28px;
      overflow-y: auto;
    }

    /* Log terminal */
    .terminal {
      background: #1A1208;
      border-radius: 12px;
      overflow: hidden;
      flex: 1;
      min-height: 280px;
      display: flex;
      flex-direction: column;
    }

    .terminal-bar {
      padding: 10px 16px;
      background: #261810;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .terminal-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .terminal-title {
      margin-left: 8px;
      font-size: 11px;
      color: #8C6E5C;
      letter-spacing: 0.08em;
    }

    .terminal-body {
      padding: 16px;
      flex: 1;
      overflow-y: auto;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.7;
      color: #D4B8A8;
    }

    .log-line { margin-bottom: 2px; }
    .log-line.success { color: #7FBA84; }
    .log-line.error   { color: #E07070; }
    .log-line.warn    { color: #E0C060; }
    .log-line.info    { color: #7AAED4; }
    .log-line.dim     { color: #6C5040; }

    .terminal-placeholder {
      color: #4A3020;
      font-style: italic;
    }

    /* Backups list */
    .backup-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    .backup-card {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      background: var(--paper);
      transition: border-color 0.2s;
    }
    .backup-card:hover { border-color: var(--peach-light); }

    .backup-device {
      font-family: var(--serif);
      font-size: 16px;
      margin-bottom: 6px;
    }

    .backup-meta {
      font-size: 11px;
      color: var(--ink-soft);
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .backup-size {
      display: inline-block;
      background: var(--peach-pale);
      color: var(--peach-dark);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 11px;
      margin-top: 8px;
    }

    .no-backups {
      color: var(--ink-soft);
      font-size: 13px;
      padding: 12px 0;
    }

    /* Progress bar */
    .progress-wrap {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-bar {
      height: 100%;
      background: var(--peach);
      width: 0%;
      transition: width 0.4s;
      border-radius: 2px;
    }
    .progress-bar.indeterminate {
      width: 40%;
      animation: slide 1.4s ease-in-out infinite;
    }
    @keyframes slide {
      0%   { transform: translateX(-150%); }
      100% { transform: translateX(350%); }
    }

    .refresh-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink-soft);
      font-size: 13px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s;
    }
    .refresh-btn:hover { color: var(--peach-dark); }

    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <!-- Peach SVG icon -->
      <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 6C16 6 10 8 9 15C8 21 11 27 16 27C21 27 24 21 23 15C22 8 16 6 16 6Z" fill="#FF8C6B"/>
        <path d="M16 6C16 6 14 9 15.5 14C17 19 20 22 20 22" stroke="#C45C3A" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M16 6C17 4 19.5 3.5 20.5 5" stroke="#5A8A5E" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Peach
    </div>
    <div class="header-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </header>

  <main>
    <!-- Sidebar -->
    <aside class="sidebar">

      <div>
        <div class="section-label">Connected Device</div>
        <div class="device-list" id="deviceList">
          <div class="no-device">No iOS device detected.<br>Plug in your iPhone or iPad.</div>
        </div>
      </div>

      <div>
        <div class="section-label">Backup Location</div>
        <div class="dir-row">
          <input type="text" id="backupDir" placeholder="/home/user/peach-backups" />
          <button class="btn btn-ghost" onclick="saveDir()">Save</button>
        </div>
      </div>

      <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
        <button class="btn btn-primary" id="backupBtn" onclick="startBackup()" disabled>
          Back Up Now
        </button>
        <button class="btn btn-cancel" id="cancelBtn" onclick="cancelBackup()" style="display:none">
          Cancel Backup
        </button>
        <div class="progress-wrap" id="progressWrap" style="display:none">
          <div class="progress-bar indeterminate" id="progressBar"></div>
        </div>
      </div>

    </aside>

    <!-- Content -->
    <section class="content">

      <div>
        <div class="terminal">
          <div class="terminal-bar">
            <div class="terminal-dot" style="background:#FF5F56"></div>
            <div class="terminal-dot" style="background:#FFBD2E"></div>
            <div class="terminal-dot" style="background:#27C93F"></div>
            <span class="terminal-title">peach — backup log</span>
          </div>
          <div class="terminal-body" id="logBody">
            <span class="terminal-placeholder">Waiting for a backup to start...</span>
          </div>
        </div>
      </div>

      <div>
        <div class="section-header">
          <div class="section-label" style="margin-bottom:0">Previous Backups</div>
          <button class="refresh-btn" onclick="loadBackups()" title="Refresh">↻</button>
        </div>
        <div class="backup-grid" id="backupGrid">
          <div class="no-backups">No backups found.</div>
        </div>
      </div>

    </section>
  </main>
</div>

<script>
  let ws = null;
  let selectedUdid = null;
  let logCleared = false;
  let backupRunning = false;

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);

    ws.onopen = () => {
      setStatus('connected', 'Connected');
    };

    ws.onclose = () => {
      setStatus('', 'Disconnected');
      setTimeout(connect, 3000);
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);

      if (msg.type === 'init') {
        document.getElementById('backupDir').value = msg.backup_dir || '';
        renderDevices(msg.devices || []);
        setBackupRunning(msg.backup_running);
        loadBackups();
      }

      if (msg.type === 'log') {
        appendLog(msg.message);
      }

      if (msg.type === 'status') {
        setBackupRunning(msg.running);
        if (!msg.running) {
          loadBackups();
        }
      }
    };
  }

  function setStatus(cls, text) {
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot ' + cls;
    document.getElementById('statusText').textContent = text;
  }

  function renderDevices(devices) {
    const list = document.getElementById('deviceList');
    if (!devices.length) {
      list.innerHTML = '<div class="no-device">No iOS device detected.<br>Plug in your iPhone or iPad.</div>';
      selectedUdid = null;
      updateBackupBtn();
      return;
    }

    list.innerHTML = devices.map(d => `
      <div class="device-card ${selectedUdid === d.udid ? 'selected' : ''}"
           onclick="selectDevice('${d.udid}')">
        <div class="device-name">${d.name || 'iPhone'}</div>
        <div class="device-meta">${d.model || ''} ${d.ios ? '· iOS ' + d.ios : ''}</div>
        <div class="device-meta" style="margin-top:4px;font-size:10px;opacity:0.6">${d.udid.substring(0,12)}...</div>
      </div>
    `).join('');

    // Auto-select first device
    if (!selectedUdid && devices.length) {
      selectedUdid = devices[0].udid;
      renderDevices(devices); // re-render with selection
    }

    updateBackupBtn();
  }

  function selectDevice(udid) {
    selectedUdid = udid;
    document.querySelectorAll('.device-card').forEach(c => {
      c.classList.toggle('selected', c.onclick.toString().includes(udid));
    });
    updateBackupBtn();
  }

  function updateBackupBtn() {
    const btn = document.getElementById('backupBtn');
    btn.disabled = !selectedUdid || backupRunning;
  }

  function setBackupRunning(running) {
    backupRunning = running;
    document.getElementById('backupBtn').style.display = running ? 'none' : 'block';
    document.getElementById('cancelBtn').style.display = running ? 'block' : 'none';
    const pw = document.getElementById('progressWrap');
    pw.style.display = running ? 'block' : 'none';
    if (running) {
      setStatus('running', 'Backing up...');
    } else {
      setStatus('connected', 'Connected');
    }
    updateBackupBtn();
  }

  function appendLog(text) {
    const body = document.getElementById('logBody');

    if (!logCleared) {
      body.innerHTML = '';
      logCleared = true;
    }

    const line = document.createElement('div');
    line.className = 'log-line';

    if (text.includes('✅') || text.includes('success') || text.includes('complete')) {
      line.classList.add('success');
    } else if (text.includes('❌') || text.includes('Error') || text.includes('error') || text.includes('failed')) {
      line.classList.add('error');
    } else if (text.includes('⚠') || text.includes('Warning')) {
      line.classList.add('warn');
    } else if (text.includes('🍑') || text.includes('Starting') || text.includes('📁')) {
      line.classList.add('info');
    }

    line.textContent = text;
    body.appendChild(line);
    body.scrollTop = body.scrollHeight;
  }

  async function startBackup() {
    if (!selectedUdid) return;
    logCleared = false;
    const res = await fetch('/api/backup/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ udid: selectedUdid }),
    });
    const data = await res.json();
    if (data.error) appendLog('❌ ' + data.error);
  }

  async function cancelBackup() {
    await fetch('/api/backup/cancel', { method: 'POST' });
  }

  async function saveDir() {
    const dir = document.getElementById('backupDir').value.trim();
    if (!dir) return;
    await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ backup_dir: dir }),
    });
  }

  async function loadBackups() {
    const res = await fetch('/api/backups');
    const data = await res.json();
    renderBackups(data.backups || []);
  }

  function renderBackups(backups) {
    const grid = document.getElementById('backupGrid');
    if (!backups.length) {
      grid.innerHTML = '<div class="no-backups">No backups found in your backup directory.</div>';
      return;
    }

    grid.innerHTML = backups.map(b => `
      <div class="backup-card">
        <div class="backup-device">${b.device_name}</div>
        <div class="backup-meta">
          <span>${b.date_human}</span>
          <span>${b.id.substring(0, 16)}...</span>
        </div>
        <span class="backup-size">${b.size_human}</span>
      </div>
    `).join('');
  }

  // Poll devices every 5s
  setInterval(async () => {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const res = await fetch('/api/devices');
    const data = await res.json();
    renderDevices(data.devices || []);
  }, 5000);

  connect();
</script>
</body>
</html>
